version: '3.8'

services:
  aura-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aura-agent
    network_mode: "host"
    volumes:
      # Используем прямые пути к файлам
      - ./../src/config.json:/app/src/config.json
      - ./../src/target.json:/app/src/target.json
      - ./../libs:/app/libs
      - ..:/app:rw
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # ВАЖНО: мапим туда, где прописано в твоем prometheus.yml
      - ./../src/target.json:/etc/prometheus/target.json
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: always
